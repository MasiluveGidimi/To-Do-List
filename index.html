<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TO-DO LIST APP</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="heading">
    <h1>TO DO LIST</h1>
  </div>
  <hr>
     <div id="addTaskArea">

  <input type="text" id="newTask" placeholder="Enter new task">

  <button type="button" onclick="addTask()">Add Task</button>

</div>

<p id="taskCounter"></p>
    
     <button type="button" onclick="restoreTask()">Restore Last Deleted</button>
    

     <div id="taskList">
      
     <div class="items">
    <input onclick="markDone(this)" type="checkbox" id="Structure">
    <label>Learn HTML page structure</label><br/>
    <button type="button" onclick="deleteTask(this)">delete</button>
    </div>
    

    <div class="items">
   <input onclick="markDone(this)" type="checkbox" id="Tags">
   <label>Practice semantic HTML tags</label><br>
   <button type="button" onclick="deleteTask(this)">delete</button>
   </div>
  


  <div class="items">
  <input  onclick="markDone(this)" type="checkbox" id="Inputs" required>
<label>Create forms and inputs</label><br>
<button type="button" onclick="deleteTask(this)">delete</button> 
  </div>
 
  <div class="items">
  <input  onclick="markDone(this)" type="checkbox" id="Selector"  required>
  <label>Learn CSS selectors</label><br>
  <button type="button" onclick="deleteTask(this)">delete</button>
  </div>

  <div class="items">
  <input  onclick="markDone(this)" type="checkbox" id="Flexbox" required>
  <label>Practice Flexbox</label><br>
   <button type="button" onclick="deleteTask(this)">delete</button>
  </div>
 

  <div class="items">
  <input  onclick="markDone(this)" type="checkbox" id="Grid" required>
  <label>Practice CSS Grid</label><br>
  <button type="button" onclick="deleteTask(this)">delete</button>
  </div>
  
  <div class="items">
  <input  onclick="markDone(this)" type="checkbox" id="Responsive" required>
  <label>Learn responsive design with @media</label><br>
  <button type="button" onclick="deleteTask(this)">delete</button>
  </div>
  
  </div> 
  

  
  <script src="script.js"></script>
</body>
</html>
